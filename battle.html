                    <svg class="timer-svg" viewBox="0 0 200 200">
                        <defs>
                            <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle class="timer-circle-bg" cx="100" cy="100" r="95"></circle>
                        <circle class="timer-circle-progress" cx="100" cy="100" r="95" style="stroke-dasharray: 597; stroke-dashoffset: 0;"></circle>
                    </svg>
                    <div class="timer-text">
                        <div class="timer-time">60</div>
                        <div class="timer-label">seconds</div>
                    </div>
                </div>

                <div style="text-align: center;">
                    <div class="submission-status">
                        Submissions:<br/>
                        <span class="count">0</span>
                    </div>
                </div>
            </div>

            <div class="host-responses"></div>
        </div>

        <div class="host-sidebar">
            <div class="leaderboard">
                <div class="leaderboard-title">Leaderboard</div>
                <div class="leaderboard-rows"></div>
            </div>

            <div style="margin-top: var(--space-xl); display: flex; gap: var(--space-md);">
                <button class="btn btn-success" onclick="handleNextRound()" style="flex: 1;">Next</button>
            </div>
        </div>
    </div>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         PLAYER SCREEN
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div class="player-screen screen">
        <div class="player-container">
            <div class="player-header">
                <h1>AI Battle</h1>
                <div class="player-name"></div>
            </div>

            <div class="round-badge"></div>

            <div class="player-timer">
                <div class="time">60</div>
                <div class="label">Time remaining</div>
            </div>

            <div class="player-question">
                <h3>Question</h3>
                <p></p>
            </div>

            <div class="prompt-input-wrapper">
                <textarea id="promptTextarea" placeholder="Write your AI prompt here... (max 300 characters)" maxlength="300"></textarea>
                <div class="char-counter">0/300</div>
            </div>

            <div class="player-actions">
                <button class="btn btn-primary" id="submitPromptBtn" onclick="handleSubmitPrompt()">Submit Prompt</button>
            </div>

            <div class="player-waiting" id="waitingContainer" style="display: none;">
                <div class="waiting-spinner"></div>
                <div class="waiting-text">Waiting for AI responses...</div>
            </div>

            <div class="player-result-container"></div>
        </div>
    </div>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESULTS SCREEN
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div class="results-screen screen">
        <div class="results-container">
            <div class="results-title">
                <h1>🎉 Game Over</h1>
                <p>Final Results</p>
            </div>

            <div class="podium-container"></div>

            <div class="best-prompt-award"></div>

            <div class="final-leaderboard">
                <div class="final-leaderboard-title">Final Leaderboard</div>
                <div class="final-leaderboard-rows"></div>
            </div>

            <div class="results-actions">
                <button class="btn btn-primary" onclick="handlePlayAgain()">Play Again</button>
            </div>
        </div>
    </div>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         QR CODE MODAL
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <button class="modal-close" onclick="handleCloseModal()">✕</button>
            <h3>Player Join Link</h3>
            <div id="qrcode"></div>
            <p class="muted">Scan to join the game</p>
        </div>
    </div>

    <script>
        // Handle prompt input change
        document.addEventListener('DOMContentLoaded', () => {
            const promptTextarea = document.getElementById('promptTextarea');
            if (promptTextarea) {
                promptTextarea.addEventListener('input', handlePromptChange);
            }

            // Handle player join
            const hash = window.location.hash;
            if (hash.includes('player')) {
                handlePlayerJoin();
            }
        });

        // Sync state across tabs/windows
        window.addEventListener('storage', (e) => {
            if (e.key === 'aibc_state') {
                const newState = JSON.parse(e.newValue);
                State.gameStatus = newState.gameStatus;
                State.timerValue = newState.timerValue;
                State.submissions = newState.submissions;
                State.roundResults = newState.roundResults;
                State.leaderboard = newState.leaderboard;
                updateAllScreens();
            }
        });
    </script>
</body>

</html>
